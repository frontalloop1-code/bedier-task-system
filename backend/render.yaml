# Render Blueprint for the Bedier Group backend.
#
# Manual deploy steps (instead of using this blueprint):
#   1. New → Web Service → connect this GitHub repo
#   2. Root Directory: backend
#   3. Build Command:  npm install && npx prisma generate && npx prisma migrate deploy
#   4. Start Command:  npm start
#   5. Environment variables:
#        DATABASE_URL      <your Neon connection string>
#        JWT_SECRET        <generate a long random string>
#        FRONTEND_ORIGIN   https://bedier-task-system1.netlify.app,http://localhost:5173
#        JWT_EXPIRES_IN    12h
#        UPLOAD_DIR        ./uploads
#        MAX_UPLOAD_MB     10
#        NODE_ENV          production
#   6. Deploy
#
# Note: Render free-tier disks are EPHEMERAL — uploaded proof files vanish on
# every restart/redeploy. For persistence, attach a Render Disk (paid) or
# swap multer's local storage for Cloudinary/S3.

services:
  - type: web
    name: bedier-task-system-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_ORIGIN
        sync: false
      - key: JWT_EXPIRES_IN
        value: 12h
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_UPLOAD_MB
        value: "10"
      - key: NODE_ENV
        value: production
