services:
  postgres:
    image: postgres:16-alpine
    container_name: bedier-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: bedier
      POSTGRES_PASSWORD: bedier
      POSTGRES_DB: bedier_tasks
    ports:
      - "5432:5432"
    volumes:
      - bedier_pgdata:/var/lib/postgresql/data

volumes:
  bedier_pgdata:
